<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обрати консультацію — AsaMoto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <i class="fa-solid fa-motorcycle"></i> AsaMoto
            </a>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-btn">Головна</a>
            <a href="catalog.html" class="nav-btn">Каталог</a>
            <a href="accessories.html" class="nav-btn">Аксесуари</a>
            <a href="parts.html" class="nav-btn">Деталі</a>
        </nav>
        <div class="user-actions">
            <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>

    <div class="page-title-container">
        <div class="breadcrumbs">Головна / Експертна допомога</div>
        <h1 class="main-page-title">Професійна консультація RealMoto</h1>
    </div>

    <div class="consultation-container">
        
        <section class="consultation-types">
            <h2>1. Оберіть напрямок, який вас цікавить</h2>
            <div class="consultation-grid">
                
                <div class="consult-card">
                    <input type="radio" name="consult_type" id="type_first" checked>
                    <label for="type_first" class="consult-card-content">
                        <div class="consult-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                        <h3>Підбір першого байка</h3>
                        <p>Допоможемо визначитися з класом (Стріт або Ендуро), кубатурою та знайти баланс між безпекою та драйвом для новачка.</p>
                    </label>
                </div>

                <div class="consult-card">
                    <input type="radio" name="consult_type" id="type_tour">
                    <label for="type_tour" class="consult-card-content">
                        <div class="consult-icon"><i class="fa-solid fa-compass"></i></div>
                        <h3>Підготовка до подорожі</h3>
                        <p>Розрахунок комплектації кофрів, підбір туристичного обвісу та аудит мотоцикла перед серйозним далекобієм.</p>
                    </label>
                </div>

                <div class="consult-card">
                    <input type="radio" name="consult_type" id="type_custom">
                    <label for="type_custom" class="consult-card-content">
                        <div class="consult-icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                        <h3>Кастомізація та Хардтейл</h3>
                        <p>Консультація з нашими інженерами щодо проектування боберів, чопперів, вибору рам та унікальних деталей.</p>
                    </label>
                </div>

                <div class="consult-card">
                    <input type="radio" name="consult_type" id="type_sport">
                    <label for="type_sport" class="consult-card-content">
                        <div class="consult-icon"><i class="fa-solid fa-stopwatch"></i></div>
                        <h3>Трек-дні та Спортбайки</h3>
                        <p>Налаштування підвіски під вашу вагу, підбір гоночної гуми та електронних асистентів (квікшифтери, лаунч).</p>
                    </label>
                </div>

            </div>
        </section>

        <section class="consultation-form-section">
            <h2>2. Контактні дані</h2>
            <form class="real-consult-form">
                <div class="form-input-group">
                    <label for="user_name">Ваше ім'я</label>
                    <input type="text" id="user_name" placeholder="Олександр" required>
                </div>

                <div class="form-input-group">
                    <label for="user_phone">Номер телефону</label>
                    <input type="tel" id="user_phone" placeholder="+380" required>
                </div>

                <div class="form-input-group">
                    <label>Зручний спосіб зв'язку</label>
                    <div class="messenger-selector">
                        <label class="msg-btn">
                            <input type="radio" name="contact_method" value="phone" checked>
                            <span><i class="fa-solid fa-phone"></i> Дзвінок</span>
                        </label>
                        <label class="msg-btn">
                            <input type="radio" name="contact_method" value="telegram">
                            <span><i class="fa-brands fa-telegram"></i> Telegram</span>
                        </label>
                        <label class="msg-btn">
                            <input type="radio" name="contact_method" value="viber">
                            <span><i class="fa-brands fa-viber"></i> Viber</span>
                        </label>
                    </div>
                </div>

                <div class="form-input-group">
                    <label for="user_comment">Додаткові побажання (необов'язково)</label>
                    <textarea id="user_comment" rows="4" placeholder="Наприклад: зріст 185 см, шукаю байк для щоденних поїздок на роботу..."></textarea>
                </div>

                <button type="submit" class="submit-consult-btn">Забронювати час консультації</button>
            </form>
        </section>

    </div>

    <footer class="footer">
        <div class="logo">
            <i class="fa-solid fa-motorcycle"></i> AsaMoto
        </div>
        <div class="footer-contacts">
            <span>+380990000000</span>
            <span>м.Київ вул.Механіків 4</span>
        </div>
    </footer>

</body>
</html>
